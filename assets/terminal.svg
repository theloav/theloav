<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 470" fill="none" role="img" aria-label="Animated security terminal">
  <style>
    :root { --fg:#e6edf3; --cy:#38C2FF; --gr:#27c93f; --rd:#ff5f56; --dim:#7d8590; }
    .win   { animation: glow 3.5s ease-in-out infinite; }
    .mono  { font-family: 'Fira Code','JetBrains Mono','Courier New',monospace; }
    .line  { opacity:0; }
    .type  { clip-path: inset(0 100% 0 0); animation: type 14s steps(1,end) infinite; }
    .l1{ animation-delay:.3s }  .l2{ animation-delay:1.7s } .l3{ animation-delay:3.1s }
    .l4{ animation-delay:4.6s } .l5{ animation-delay:6.1s } .l6{ animation-delay:7.6s }
    .l7{ animation-delay:9.2s } .l8{ animation-delay:10.6s }
    .show1{ animation:show 14s steps(1,end) infinite; animation-delay:.3s }
    .show2{ animation:show 14s steps(1,end) infinite; animation-delay:1.7s }
    .show3{ animation:show 14s steps(1,end) infinite; animation-delay:3.1s }
    .show4{ animation:show 14s steps(1,end) infinite; animation-delay:4.6s }
    .show5{ animation:show 14s steps(1,end) infinite; animation-delay:6.1s }
    .show6{ animation:show 14s steps(1,end) infinite; animation-delay:7.6s }
    .show7{ animation:show 14s steps(1,end) infinite; animation-delay:9.2s }
    .show8{ animation:show 14s steps(1,end) infinite; animation-delay:10.6s }
    .cursor{ animation: blink 1s steps(1) infinite; }
    .grant { opacity:0; animation: grant 14s ease-in-out infinite; animation-delay:11.8s; }
    @keyframes type  { 0%{clip-path:inset(0 100% 0 0)} 6%{clip-path:inset(0 0 0 0)} 88%{clip-path:inset(0 0 0 0)} 100%{clip-path:inset(0 100% 0 0)} }
    @keyframes show  { 0%{opacity:0} 1%{opacity:1} 88%{opacity:1} 100%{opacity:0} }
    @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
    @keyframes glow  { 0%,100%{filter:drop-shadow(0 0 3px #38C2FF88)} 50%{filter:drop-shadow(0 0 14px #38C2FFcc)} }
    @keyframes grant { 0%,84%{opacity:0;transform:scale(.96)} 90%{opacity:1;transform:scale(1)} 99%{opacity:1} 100%{opacity:0} }
  </style>

  <!-- window -->
  <g class="win">
    <rect x="10" y="10" width="840" height="450" rx="14" fill="#0d1117" stroke="#38C2FF" stroke-opacity=".55" stroke-width="1.5"/>
    <rect x="10" y="10" width="840" height="46" rx="14" fill="#161b22"/>
    <rect x="10" y="42" width="840" height="14" fill="#161b22"/>
    <circle cx="42" cy="33" r="7" fill="#ff5f56"/>
    <circle cx="66" cy="33" r="7" fill="#ffbd2e"/>
    <circle cx="90" cy="33" r="7" fill="#27c93f"/>
    <text x="430" y="38" text-anchor="middle" class="mono" font-size="15" fill="#7d8590">shrivarshan@security: ~/redteam</text>
  </g>

  <!-- lines -->
  <g class="mono" font-size="19">
    <g class="line show1"><g class="type l1"><text x="34" y="98"><tspan fill="#38C2FF">$</tspan> <tspan fill="#e6edf3">whoami</tspan></text></g></g>
    <g class="line show2"><g class="type l2"><text x="34" y="132" fill="#7d8590">&#8250; Shrivarshan Kasi Arul — Security Engineer @ InCorp Global</text></g></g>

    <g class="line show3"><g class="type l3"><text x="34" y="176"><tspan fill="#38C2FF">$</tspan> <tspan fill="#e6edf3">./recon --target llm-agent --chain inject</tspan></text></g></g>
    <g class="line show4"><g class="type l4"><text x="34" y="210"><tspan fill="#27c93f">[+]</tspan> <tspan fill="#c9d1d9">indirect prompt-injection vector </tspan><tspan fill="#ff5f56">CRITICAL</tspan></text></g></g>
    <g class="line show5"><g class="type l5"><text x="34" y="244"><tspan fill="#27c93f">[+]</tspan> <tspan fill="#c9d1d9">tool-misuse &#8594; exfiltration chain confirmed</tspan></text></g></g>

    <g class="line show6"><g class="type l6"><text x="34" y="288"><tspan fill="#38C2FF">$</tspan> <tspan fill="#e6edf3">disclose --responsible</tspan></text></g></g>
    <g class="line show7"><g class="type l7"><text x="34" y="322"><tspan fill="#27c93f">&#10003;</tspan> <tspan fill="#c9d1d9">reported &#183; patched &#183; rewarded</tspan></text></g></g>
  </g>

  <!-- access granted stamp -->
  <g class="grant" transform="translate(430,382)">
    <rect x="-150" y="-26" width="300" height="52" rx="10" fill="#0d1117" stroke="#27c93f" stroke-width="2"/>
    <text x="0" y="7" text-anchor="middle" class="mono" font-size="22" fill="#27c93f" letter-spacing="3">ACCESS&#160;GRANTED</text>
  </g>

  <!-- blinking prompt cursor -->
  <text x="34" y="430" class="mono" font-size="19"><tspan fill="#38C2FF">$</tspan> <tspan class="cursor" fill="#38C2FF">&#9608;</tspan></text>
</svg>
