<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 12" fill="none" role="img" aria-label="divider">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38C2FF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#38C2FF" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#38C2FF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="spark">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.4" stop-color="#38C2FF"/>
      <stop offset="1" stop-color="#38C2FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="1.4"/></filter>
  </defs>

  <rect x="0" y="5" width="900" height="2" fill="url(#base)"/>

  <!-- travelling light pulse -->
  <circle cx="0" cy="6" r="7" fill="url(#spark)" filter="url(#blur)">
    <animate attributeName="cx" values="60;840;60" dur="4.5s" repeatCount="indefinite" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1"/>
  </circle>
  <circle cx="0" cy="6" r="2.5" fill="#ffffff">
    <animate attributeName="cx" values="60;840;60" dur="4.5s" repeatCount="indefinite" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1"/>
  </circle>
</svg>
